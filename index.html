<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Macroeconomia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.5.0/Recharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#080810] text-gray-100 font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const { AreaChart, Area, BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend } = Recharts;

        const gdpData = [
            { ano:"2014", Brasil:2.5 }, { ano:"2015", Brasil:-3.5 }, { ano:"2016", Brasil:-3.3 },
            { ano:"2017", Brasil:1.3 }, { ano:"2018", Brasil:1.8 }, { ano:"2019", Brasil:1.2 },
            { ano:"2020", Brasil:-3.9 }, { ano:"2021", Brasil:5.0 }, { ano:"2022", Brasil:3.0 },
            { ano:"2023", Brasil:2.9 }, { ano:"2024", Brasil:3.4 }
        ];

        const ipcaData = [
            { per:"Jan/22", IPCA:0.54 }, { per:"Abr/22", IPCA:1.06 }, { per:"Jul/22", IPCA:-0.68 },
            { per:"Out/22", IPCA:0.59 }, { per:"Jan/23", IPCA:0.53 }, { per:"Abr/23", IPCA:0.61 },
            { per:"Jul/23", IPCA:-0.07 }, { per:"Out/23", IPCA:0.24 }
        ];

        const selicData = [
            { per:"Jan/21", Selic:2.0 }, { per:"Jun/21", Selic:4.25 }, { per:"Jan/22", Selic:9.25 },
            { per:"Jun/22", Selic:13.25 }, { per:"Jun/23", Selic:13.75 }, { per:"Dez/23", Selic:11.75 },
            { per:"Jun/24", Selic:10.5 }, { per:"Mar/25", Selic:13.25 }
        ];

        function App() {
            return (
                <div className="p-4 max-w-4xl mx-auto space-y-8">
                    <h1 className="text-3xl font-bold text-yellow-400 text-center my-6">Dashboard Econômico</h1>
                    
                    {/* PIB */}
                    <div className="bg-[#11111d] p-6 rounded-2xl border border-gray-800 shadow-xl">
                        <h2 className="text-xl font-semibold mb-4 text-yellow-500">Crescimento do PIB (%)</h2>
                        <div className="h-64">
                            <ResponsiveContainer width="100%" height="100%">
                                <AreaChart data={gdpData}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#222" />
                                    <XAxis dataKey="ano" stroke="#888" />
                                    <YAxis stroke="#888" />
                                    <Tooltip contentStyle={{backgroundColor:'#0d0d1a', border:'1px solid #ffd200'}}/>
                                    <Area type="monotone" dataKey="Brasil" stroke="#ffd200" fill="#ffd200" fillOpacity={0.1} strokeWidth={3} />
                                </AreaChart>
                            </ResponsiveContainer>
                        </div>
                    </div>

                    {/* IPCA */}
                    <div className="bg-[#11111d] p-6 rounded-2xl border border-gray-800 shadow-xl">
                        <h2 className="text-xl font-semibold mb-4 text-blue-400">Inflação Mensal (IPCA)</h2>
                        <div className="h-64">
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={ipcaData}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#222" />
                                    <XAxis dataKey="per" stroke="#888" />
                                    <YAxis stroke="#888" />
                                    <Tooltip contentStyle={{backgroundColor:'#0d0d1a', border:'1px solid #60a5fa'}}/>
                                    <Bar dataKey="IPCA" fill="#60a5fa" radius={[4, 4, 0, 0]} />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>

                    {/* SELIC */}
                    <div className="bg-[#11111d] p-6 rounded-2xl border border-gray-800 shadow-xl">
                        <h2 className="text-xl font-semibold mb-4 text-green-400">Taxa Selic (%)</h2>
                        <div className="h-64">
                            <ResponsiveContainer width="100%" height="100%">
                                <LineChart data={selicData}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#222" />
                                    <XAxis dataKey="per" stroke="#888" />
                                    <YAxis stroke="#888" />
                                    <Tooltip contentStyle={{backgroundColor:'#0d0d1a', border:'1px solid #4ade80'}}/>
                                    <Line type="stepAfter" dataKey="Selic" stroke="#4ade80" strokeWidth={4} dot={{r:6, fill:'#4ade80'}} />
                                </LineChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
