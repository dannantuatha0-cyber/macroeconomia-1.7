<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seminário: Rochas dos Planaltos</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { color: #f1c40f; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        .container {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
            perspective: 1000px;
        }

        /* Efeito 3D nos Cards */
        .card {
            width: 220px;
            height: 300px;
            cursor: pointer;
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }

        .card:hover {
            transform: rotateY(15deg) rotateX(5deg) scale(1.05);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            background: #333;
            border-radius: 15px;
            border: 2px solid #f1c40f;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .card img {
            width: 100%;
            height: 70%;
            object-fit: cover;
        }

        .card-label {
            height: 30%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            background: #222;
        }

        /* Painel de Informações Interativo */
        #info-panel {
            margin-top: 50px;
            width: 90%;
            max-width: 700px;
            padding: 25px;
            background: #ffffff;
            color: #1a1a1a;
            border-radius: 20px;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #info-panel h2 { margin-top: 0; color: #2980b9; border-bottom: 2px solid #ddd; }
        .highlight { font-weight: bold; color: #c0392b; }
    </style>
</head>
<body>

    <h1>Rochas dos Planaltos Brasileiros</h1>
    <p>Passe o mouse para o efeito 3D e clique para ver os detalhes</p>

    <div class="container">
