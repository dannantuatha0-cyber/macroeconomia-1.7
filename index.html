<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Seminário: Rochas dos Planaltos</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; }
        .container { display: flex; gap: 20px; margin-top: 50px; }
        
        /* Efeito 3D nas fotos */
        .card {
            width: 200px; height: 250px;
            perspective: 1000px; cursor: pointer;
        }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s; transform-style: preserve-3d;
            border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .card:hover .card-inner { transform: rotateY(10deg) scale(1.05); }
        
        .card-front {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #34495e; border: 2px solid #ecf0f1;
        }
        .card-front img { width: 80%; border-radius: 10px; }

        /* Painel de informações */
        #info-panel {
            margin-top: 40px; width: 80%; max-width: 600px;
            padding: 20px; background: #ecf0f1; color: #2c3e50;
            border-radius: 15px; display: none; text-align: center;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h1 { color: #f1c40f; }
    </style>
</head>
<body>

    <h1>Interativo: Rochas e Planaltos</h1>
    <p>Clique em uma rocha para ver os detalhes</p>

    <div class="container">
        <div class="card" onclick="showInfo('basalto')">
            <div class="card-inner">
                <div class="card-front">
                    <p>BASALTO</p>
                    <small>(Vulcânica)</small>
                </div>
            </div>
        </div>

        <div class="card" onclick="showInfo('arenito')">
            <div class="card-inner">
                <div class="card-front">
                    <p>ARENITO</p>
                    <small>(Sedimentar)</small>
                </div>
            </div>
        </div>

        <div class="card" onclick="showInfo('granito')">
            <div class="card-inner">
                <div class="card-front">
                    <p>GRANITO</p>
                    <small>(Cristalina)</small>
                </div>
            </div>
        </div>
    </div>

    <div id="info-panel">
        <h2 id="rock-name"></h2>
        <p><strong>Características:</strong> <span id="rock-desc"></span></p>
        <p><strong>Tipo de Planalto:</strong> <span id="rock-plateau"></span></p>
    </div>

    <script>
        const data = {
            basalto: {
                name: "Basalto",
                desc: "Rocha escura, densa e muito resistente. Origem vulcânica (magma resfriado).",
                plateau: "Planaltos Basálticos (Ex: Planalto Meridional). Gera a fertil terra roxa."
            },
            arenito: {
                name: "Arenito",
                desc: "Formada por grãos de areia compactados. Textura porosa e fácil de erodir.",
                plateau: "Planaltos Sedimentares (Ex: Chapadas). Forma paredões verticais."
            },
            granito: {
                name: "Granito",
                desc: "Muito dura, composta por quartzo, feldspato e mica. Muito antiga.",
                plateau: "Planaltos Cristalinos (Ex: Planalto da Borborema). Resiste ao tempo há bilhões de anos."
            }
        };

        function showInfo(rock) {
            const panel = document.getElementById('info-panel');
            document.getElementById('rock-name').innerText = data[rock].name;
            document.getElementById('rock-desc').innerText = data[rock].desc;
            document.getElementById('rock-plateau').innerText = data[rock].plateau;
            panel.style.display = 'block';
        }
    </script>
</body>
</html>
